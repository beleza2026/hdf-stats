workflows:
  ios-release:
    name: MatchGol Stats - iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - matchgol
      vars:
        BUNDLE_ID: com.hdfstats.app
        APP_STORE_APP_ID: "6768657341"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hdfstats.app
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Create ExportOptions
        script: |
          cat > $CM_BUILD_DIR/ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hdfstats.app</key>
              <string>MatchGol AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=REVENUECAT_API_KEY_IOS="$REVENUECAT_API_KEY_IOS" \
            --export-options-plist=$CM_BUILD_DIR/ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - haromarce@hotmail.com
        notify:
          success: true
          failure: true
